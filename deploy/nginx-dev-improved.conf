server {
    listen 80;
    server_name dev.visit.west-it.ru;

    # Проксирование запросов к frontend
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 300s;  # Увеличенный таймаут
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Добавляем Access-Control-Allow-Origin для всех кросс-доменных запросов
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Accept,Content-Type, Origin, Authorization' always;
    }

    # Проксирование запросов к API
    location /api {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 300s;  # Увеличенный таймаут
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Добавляем Access-Control-Allow-Origin для всех кросс-доменных запросов
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Accept,Content-Type, Origin, Authorization' always;
        
        # Предварительная обработка OPTIONS запросов для CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Обработка статических файлов для PWA с кэшированием
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires max;
        add_header Cache-Control "public, max-age=31536000";
        proxy_pass http://127.0.0.1:3001;
    }

    # Обработка manifest.json для PWA
    location /manifest.json {
        proxy_pass http://127.0.0.1:3001/manifest.json;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }
    
    # Обработка service-worker.js для PWA без кэширования
    location /service-worker.js {
        proxy_pass http://127.0.0.1:3001/service-worker.js;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # Специальная обработка для файлов шрифтов
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires max;
        add_header Cache-Control "public, max-age=31536000";
        proxy_pass http://127.0.0.1:3001;
    }
    
    # Обработка ошибок для отладки
    error_page 502 /502.html;
    location = /502.html {
        add_header Content-Type text/html;
        return 502 "<!DOCTYPE html><html><head><title>502 Bad Gateway</title></head><body><h1>502 Bad Gateway</h1><p>Сервер столкнулся с временной ошибкой и не смог выполнить ваш запрос.</p><p>Пожалуйста, повторите попытку через 30 секунд.</p></body></html>";
    }
}
