version: '3'

services:
  db:
    image: postgres:14
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=WestVisit_Dev_Pass_2025
      - POSTGRES_USER=west_visit
      - POSTGRES_DB=west_visit_dev
    restart: always
    ports:
      - '5433:5432' # Добавь это для проброса порта
    networks:
      - west_visit_dev

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://west_visit:WestVisit_Dev_Pass_2025@db:5432/west_visit_dev
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=west_visit_dev
      - POSTGRES_USER=west_visit
      - POSTGRES_PASSWORD=WestVisit_Dev_Pass_2025
      - JWT_SECRET=west_visit_dev_jwt_secret_2025
      - BITRIX_API_ENDPOINT=https://crmwest.ru/rest/156/fnonb6nklg81kzy1/
      - ENVIRONMENT=development
      - DOCKER_ENV=true
      # Явно указываем путь к Excel файлам
      - EXCEL_UPLOAD_PATH=/home/ftpvisit/ftp/upload
      # FTP configuration - replace with your actual FTP credentials
      - FTP_HOST=${FTP_HOST:-ftp.example.com}
      - FTP_USER=${FTP_USER:-username}
      - FTP_PASSWORD=${FTP_PASSWORD:-password}
      - FTP_DIRECTORY=${FTP_DIRECTORY:-/clinics}
      - FTP_FILENAME=${FTP_FILENAME:-clinics.json}
    volumes:
      # Прямое монтирование без переменных окружения
      - /home/ftpvisit/ftp/upload:/src/upload
      - /var/www/west-visit/dev/logs:/src/logs
    ports:
      - '8001:8000'
    restart: always
    networks:
      - west_visit_dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=https://dev.visit.west-it.ru/api
        - REACT_APP_ENV=development
    depends_on:
      - backend
    ports:
      - '3001:80'
    restart: always
    networks:
      - west_visit_dev

networks:
  west_visit_dev:

volumes:
  postgres_data_dev:
  excel_upload_dev:
