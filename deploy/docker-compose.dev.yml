version: '3'

services:
  db:
    image: postgres:14
    container_name: opora_postgres_dev
    volumes:
      - opora_postgres_data_dev:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-opora_dev_pass}
      - POSTGRES_USER=${POSTGRES_USER:-opora_user}
      - POSTGRES_DB=${POSTGRES_DB:-opora_dev}
    restart: always
    ports:
      - '${DB_PORT:-4202}:5432'
    networks:
      - opora_network_dev
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U opora_user -d opora_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: opora_backend_dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-opora_user}:${POSTGRES_PASSWORD:-opora_dev_pass}@db:5432/${POSTGRES_DB:-opora_dev}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-opora_dev}
      - POSTGRES_USER=${POSTGRES_USER:-opora_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-opora_dev_pass}
      - JWT_SECRET=${JWT_SECRET:-opora-dev-jwt-secret}
      - BITRIX_API_ENDPOINT=${BITRIX_API_ENDPOINT:-}
      - ENVIRONMENT=development
      - DOCKER_ENV=true
      - DEV_MODE=True
      - CORS_ORIGINS=http://localhost:4200
      - EXCEL_UPLOAD_PATH=/app/upload
      - TOKEN_DADATA=${TOKEN_DADATA:-}
      - SECRET_DADATA=${SECRET_DADATA:-}
      - FTP_HOST=${FTP_HOST:-}
      - FTP_USER=${FTP_USER:-}
      - FTP_PASSWORD=${FTP_PASSWORD:-}
      - FTP_DIRECTORY=${FTP_DIRECTORY:-}
      - FTP_FILENAME=${FTP_FILENAME:-}
    volumes:
      - ./upload:/app/upload
      - /var/www/opora/dev/logs:/app/logs
    ports:
      - '${BACKEND_PORT:-4201}:8000'
    restart: always
    networks:
      - opora_network_dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://localhost:4201/api
        - REACT_APP_ENV=development
    container_name: opora_frontend_dev
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PORT:-4200}:80'
    restart: always
    networks:
      - opora_network_dev

networks:
  opora_network_dev:

volumes:
  opora_postgres_data_dev:
