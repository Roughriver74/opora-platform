name: Deploy Beton CRM

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm run install:all
        
      - name: Lint client
        run: cd client && npm run lint
        continue-on-error: true
        
      - name: Build client
        run: cd client && npm run build
        
      - name: Build server
        run: cd server && npm run build
      
      - name: Upload client build
        uses: actions/upload-artifact@v3
        with:
          name: client-build
          path: client/build
          
      - name: Upload server build
        uses: actions/upload-artifact@v3
        with:
          name: server-build
          path: server/dist

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Download client build
        uses: actions/download-artifact@v3
        with:
          name: client-build
          path: client/build
          
      - name: Download server build
        uses: actions/download-artifact@v3
        with:
          name: server-build
          path: server/dist
          
      # Настраиваем SSH для деплоя
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace
          
      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          
      - name: Copy files to server
        env:
          SERVER_USER: ${{ secrets.SSH_USER }}
          SERVER_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # Создаем директорию для деплоя на сервере, если она не существует
          ssh $SERVER_USER@$SERVER_HOST "mkdir -p $DEPLOY_PATH"
          
          # Создаем архив для передачи
          tar -czf deploy.tar.gz \
            --exclude="node_modules" \
            --exclude=".git" \
            --exclude="client/node_modules" \
            --exclude="server/node_modules" \
            server/dist \
            server/package.json \
            server/package-lock.json \
            client/build \
            package.json \
            ecosystem.config.js
            
          # Копируем архив на сервер
          scp deploy.tar.gz $SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/
          
          # Копируем .env файл если существует
          if [ -f .env.production ]; then
            scp .env.production $SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/.env
          fi
          
      - name: Setup application on server
        env:
          SERVER_USER: ${{ secrets.SSH_USER }}
          SERVER_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # Распаковываем архив и устанавливаем зависимости
          ssh $SERVER_USER@$SERVER_HOST "cd $DEPLOY_PATH && \
            tar -xzf deploy.tar.gz && \
            cd server && npm install --production && \
            cd .. && npm install --production"
          
      - name: Setup & restart PM2
        env:
          SERVER_USER: ${{ secrets.SSH_USER }}
          SERVER_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # Установка PM2 на сервере, если его нет
          ssh $SERVER_USER@$SERVER_HOST "cd $DEPLOY_PATH && \
            npm install pm2 -g && \
            pm2 delete beton-crm 2>/dev/null || true && \
            pm2 start ecosystem.config.js --env production && \
            pm2 save && \
            pm2 startup | grep -v PM2 | bash || true"
