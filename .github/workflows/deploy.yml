name: Deploy Beton CRM

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm run install:all
        
      # Линтинг отключен, так как скрипт отсутствует в package.json
      # - name: Lint client
      #   run: cd client && npm run lint
        
      - name: Build client
        run: |
          # Установка пустого базового URL для использования на сервере
          echo "REACT_APP_API_URL=" > client/.env
          cd client && CI=false npm run build
        
      - name: Build server
        run: cd server && npm run build
      
      - name: Upload client build
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build
          retention-days: 1
          
      - name: Upload server build
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: server/dist
          retention-days: 1

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download client build
        uses: actions/download-artifact@v4
        with:
          name: client-build
          path: client/build
          
      - name: Download server build
        uses: actions/download-artifact@v4
        with:
          name: server-build
          path: server/dist
          
      # Настраиваем SSH для деплоя
      - name: Configure SSH
        uses: shimataro/ssh-key-action@v2.5.1
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace
          
      - name: Add known hosts
        shell: bash
        run: |
          ssh-keyscan -H "${{ vars.SSH_HOST }}" >> ~/.ssh/known_hosts
          
      - name: Deploy to server
        shell: bash
        run: |
          # Создаем директорию для деплоя на сервере
          ssh ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} "mkdir -p ${{ secrets.DEPLOY_PATH }}"
          
          # Создаем архив для передачи
          tar -czf deploy.tar.gz \
            --exclude="node_modules" \
            --exclude=".git" \
            --exclude="client/node_modules" \
            --exclude="server/node_modules" \
            server/dist \
            server/package.json \
            server/package-lock.json \
            client/build \
            package.json \
            ecosystem.config.js
            
          # Копируем архив на сервер
          scp deploy.tar.gz ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/
          
          # Копируем .env файл если существует
          if [ -f .env.production ]; then
            scp .env.production ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/.env
          fi
          
          # Распаковываем архив и устанавливаем зависимости
          ssh ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} "cd ${{ secrets.DEPLOY_PATH }} && \
            tar -xzf deploy.tar.gz && \
            cd server && npm install --production && \
            cd .. && npm install --production && \
            npm install pm2 -g && \
            pm2 delete beton-crm 2>/dev/null || true && \
            pm2 start ecosystem.config.js --env production && \
            pm2 save && \
            pm2 startup | grep -v PM2 | bash || true"

