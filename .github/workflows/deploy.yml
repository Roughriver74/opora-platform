name: Deploy to Production

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch: # Позволяет запускать вручную из GitHub UI

env:
  NODE_VERSION: '18'
  SERVER_USER: root
  SERVER_IP: 31.128.39.123
  SERVER_DOMAIN: beton.shknv.ru
  APP_DIR: /var/www/beton-crm

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: |
          echo "📦 Установка зависимостей клиента..."
          cd client && npm ci --silent
          echo "📦 Установка зависимостей сервера..."
          cd ../server && npm ci --silent

      - name: Configure production environment
        run: |
          echo "⚙️ Настройка переменных окружения для продакшн..."
          echo "REACT_APP_API_URL=https://${{ env.SERVER_DOMAIN }}:5001/api" > client/.env
          echo "✅ API URL настроен для продакшн сервера (HTTPS)"

      - name: Build project
        run: |
          echo "🔨 Сборка проекта..."
          cd client && DISABLE_ESLINT_PLUGIN=true CI=false npm run build
          cd ../server && npm run build
        env:
          NODE_ENV: production

      - name: Restore local environment
        run: |
          if [ -f "client/.env.backup" ]; then
            mv client/.env.backup client/.env
          fi

      - name: Create deployment archive
        run: |
          echo "📦 Создание архива для деплоя..."
          ARCHIVE_NAME="deploy-docker-$(date +%s).tar.gz"
          tar -czf "$ARCHIVE_NAME" \
            --exclude="node_modules" \
            --exclude=".git" \
            --exclude="client/node_modules" \
            --exclude="server/node_modules" \
            --exclude="postgres_data" \
            --exclude="redis_data" \
            server/dist \
            server/src \
            server/tsconfig.json \
            server/package.json \
            server/package-lock.json \
            server/Dockerfile.production \
            client/build \
            client/package.json \
            client/package-lock.json \
            client/Dockerfile.production \
            client/nginx.conf \
            docker-compose.yml \
            ecosystem.config.js \
            .env.production \
            promtail-config.yaml \
            scripts/
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV
          echo "✅ Архив $ARCHIVE_NAME создан"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Check server backups
        run: |
          echo "🔍 Проверка резервных копий на сервере..."
          ssh -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} << 'ENDSSH'
            if [ ! -d "/var/backups/beton-crm" ] || [ -z "$(ls -A /var/backups/beton-crm 2>/dev/null)" ]; then
              echo "❌ КРИТИЧЕСКАЯ ОШИБКА: Резервные копии не найдены!"
              exit 1
            fi
            echo "✅ Резервные копии найдены:"
            ls -la /var/backups/beton-crm/ | tail -3
          ENDSSH

      - name: Copy archive to server
        run: |
          echo "📤 Копирование архива на сервер..."
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} "mkdir -p ${{ env.APP_DIR }}"
          scp -o StrictHostKeyChecking=no "${{ env.ARCHIVE_NAME }}" ${{ env.SERVER_USER }}@${{ env.SERVER_IP }}:${{ env.APP_DIR }}/
          echo "✅ Файлы скопированы на сервер"

      - name: Deploy on server
        run: |
          echo "🚀 Деплой на сервере..."
          ssh -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} << ENDSSH
            set -e
            cd ${{ env.APP_DIR }}

            # Создание резервной копии текущей версии
            if [ -d "server" ] || [ -d "client" ]; then
              echo "💾 Создание резервной копии текущей версии..."
              BACKUP_NAME="app-backup-\$(date +%s).tar.gz"
              tar -czf \$BACKUP_NAME server client docker-compose.yml ecosystem.config.js 2>/dev/null || true
              mkdir -p backups
              mv \$BACKUP_NAME backups/ 2>/dev/null || true
            fi

            # Остановка старого приложения
            if pm2 list | grep -q "beton-crm"; then
              echo "🛑 Остановка старого приложения..."
              pm2 stop beton-crm || true
              pm2 delete beton-crm || true
            fi

            # Распаковка нового приложения
            echo "📦 Распаковка нового приложения..."
            rm -rf server client 2>/dev/null || true
            tar -xzf ${{ env.ARCHIVE_NAME }}

            # Установка Docker если не установлен
            if ! command -v docker &> /dev/null; then
              echo "🐳 Установка Docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sh get-docker.sh
              systemctl enable docker
              systemctl start docker
            fi

            # Установка Docker Compose если не установлен
            if ! command -v docker-compose &> /dev/null; then
              echo "🐳 Установка Docker Compose..."
              curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-\$(uname -s)-\$(uname -m)" -o /usr/local/bin/docker-compose
              chmod +x /usr/local/bin/docker-compose
            fi

            # Создание директорий для логов
            mkdir -p /var/log/beton-crm

            # Загрузка переменных окружения
            if [ -f ".env.production" ]; then
              cp .env.production .env
              echo "✅ Переменные окружения загружены"
            fi

            # Создание promtail-config.yaml если его нет
            if [ ! -f "promtail-config.yaml" ]; then
              echo "⚠️ promtail-config.yaml не найден, создаем базовый конфиг..."
              echo "server:" > promtail-config.yaml
              echo "  http_listen_port: 9080" >> promtail-config.yaml
              echo "  grpc_listen_port: 0" >> promtail-config.yaml
              echo "positions:" >> promtail-config.yaml
              echo "  filename: /tmp/positions.yaml" >> promtail-config.yaml
              echo "clients:" >> promtail-config.yaml
              echo "  - url: http://45.146.164.152:3100/loki/api/v1/push" >> promtail-config.yaml
              echo "scrape_configs:" >> promtail-config.yaml
              echo "  - job_name: docker" >> promtail-config.yaml
              echo "    docker_sd_configs:" >> promtail-config.yaml
              echo "      - host: unix:///var/run/docker.sock" >> promtail-config.yaml
              echo "        refresh_interval: 5s" >> promtail-config.yaml
              echo "    relabel_configs:" >> promtail-config.yaml
              echo "      - source_labels: ['__meta_docker_container_name']" >> promtail-config.yaml
              echo "        regex: '/(.*)'" >> promtail-config.yaml
              echo "        target_label: 'container'" >> promtail-config.yaml
              echo "      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']" >> promtail-config.yaml
              echo "        target_label: 'service'" >> promtail-config.yaml
              echo "      - target_label: 'host'" >> promtail-config.yaml
              echo "        replacement: 'beton-crm'" >> promtail-config.yaml
              echo "      - source_labels: ['__meta_docker_container_id']" >> promtail-config.yaml
              echo "        target_label: '__path__'" >> promtail-config.yaml
              echo "        replacement: /var/lib/docker/containers/\$1/*.log" >> promtail-config.yaml
              echo "✅ Базовый promtail-config.yaml создан"
            fi

            # Установка прав на выполнение для скриптов
            if [ -d "scripts" ]; then
              chmod +x scripts/*.sh
              echo "✅ Права на выполнение установлены для скриптов"
            fi

            echo "Docker версии:"
            docker --version
            docker-compose --version
          ENDSSH

      - name: Start application
        run: |
          echo "🚀 Запуск приложения в Docker..."
          ssh -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} << ENDSSH
            set -e
            cd ${{ env.APP_DIR }}

            # Остановка существующих контейнеров
            docker-compose down 2>/dev/null || true

            # Очистка старых образов и кэша
            echo "🧹 Очистка Docker кэша..."
            docker system prune -f 2>/dev/null || true
            docker builder prune -f 2>/dev/null || true

            # Запуск новых контейнеров БЕЗ КЭША
            echo "🔨 Запуск Docker контейнеров (пересборка без кэша)..."
            docker-compose build --no-cache

            # Запуск контейнеров
            echo "▶️ Запуск контейнеров..."
            docker-compose up -d

            # Проверяем статус запуска
            sleep 10
            if ! docker-compose ps | grep -q "Up"; then
              echo "⚠️ Первая попытка запуска не удалась, пробуем еще раз..."
              docker-compose down
              sleep 5
              docker-compose up -d
            fi

            # Ожидание запуска сервисов
            echo "⏳ Ожидание запуска сервисов..."
            sleep 30

            # Проверка статуса контейнеров
            echo "📊 Статус контейнеров:"
            docker-compose ps

            # Запуск миграций базы данных
            echo "🗄️ Запуск миграций базы данных..."
            docker-compose exec -T backend npm run migration:run:prod

            # Синхронизация данных с Bitrix в Elasticsearch
            echo "🔄 Синхронизация данных с Bitrix в Elasticsearch..."
            sleep 15

            # Проверяем, что Elasticsearch доступен
            echo "🔍 Проверка доступности Elasticsearch..."
            ELASTICSEARCH_CHECK=\$(wget -qO- --timeout=5 http://localhost:9200/_cluster/health 2>/dev/null | grep -o '"status":"[^"]*"' | cut -d'"' -f4 || echo "unavailable")

            if [ "\$ELASTICSEARCH_CHECK" = "green" ] || [ "\$ELASTICSEARCH_CHECK" = "yellow" ]; then
              echo "✅ Elasticsearch доступен (статус: \$ELASTICSEARCH_CHECK), запускаем синхронизацию..."
              
              # Инициализация алиаса Elasticsearch
              echo "🔧 Инициализация алиаса Elasticsearch..."
              docker-compose exec -T backend wget -qO- --post-data='' http://localhost:5001/api/incremental-sync/initialize-alias || true
              
              # Запускаем полную инкрементальную синхронизацию через API
              echo "📦 Выполнение полной инкрементальной синхронизации..."
              docker-compose exec -T backend wget -qO- --post-data='{"forceFullSync": true, "batchSize": 200}' \
                --header='Content-Type: application/json' \
                http://localhost:5001/api/incremental-sync/all || true
              
              # Дополнительно запускаем синхронизацию заявок
              echo "📋 Принудительная синхронизация заявок..."
              docker-compose exec -T backend wget -qO- --post-data='{"forceFullSync": true, "batchSize": 100}' \
                --header='Content-Type: application/json' \
                http://localhost:5001/api/incremental-sync/submissions || true
            else
              echo "⚠️ Elasticsearch недоступен (статус: \$ELASTICSEARCH_CHECK), пропускаем синхронизацию"
            fi

            echo "✅ Деплой в Docker завершен!"
          ENDSSH

      - name: Verify deployment
        run: |
          echo "🔍 Проверка работоспособности..."
          sleep 10

          # Проверка API
          echo "Проверка Backend API..."
          if curl -f -s -k "https://${{ env.SERVER_IP }}:5001/api/health" > /dev/null; then
            echo "✅ Backend API доступен (HTTPS)"
          elif curl -f -s "http://${{ env.SERVER_IP }}:5001/api/health" > /dev/null; then
            echo "⚠️ Backend API доступен только по HTTP"
          else
            echo "❌ Backend API недоступен"
            exit 1
          fi

          # Проверка Frontend
          echo "Проверка Frontend..."
          if curl -f -s -k "https://${{ env.SERVER_IP }}:3000" > /dev/null; then
            echo "✅ Frontend доступен (HTTPS)"
          elif curl -f -s "http://${{ env.SERVER_IP }}:3000" > /dev/null; then
            echo "⚠️ Frontend доступен только по HTTP"
          else
            echo "❌ Frontend недоступен"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Очистка временных файлов..."
          rm -f deploy-docker-*.tar.gz || true

      - name: Deployment summary
        if: success()
        run: |
          echo "## ✅ Деплой успешно завершен!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Приложение доступно по адресам:" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: https://${{ env.SERVER_IP }}:3000" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend API**: https://${{ env.SERVER_IP }}:5001/api" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Статус:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Сборка проекта завершена" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Архив создан и скопирован на сервер" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker контейнеры запущены" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Миграции базы данных выполнены" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Синхронизация с Elasticsearch запущена" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Приложение проверено и работает" >> $GITHUB_STEP_SUMMARY
