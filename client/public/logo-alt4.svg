<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон -->
  <rect width="200" height="200" fill="#2563eb" rx="20"/>
  
  <!-- Большая буква Б -->
  <text x="100" y="100" font-family="Arial, sans-serif" font-size="80" font-weight="bold" text-anchor="middle" dominant-baseline="central" fill="white">Б</text>
  
  <!-- Декоративная линия -->
  <line x1="60" y1="130" x2="140" y2="130" stroke="white" stroke-width="4" stroke-linecap="round"/>
</svg> 