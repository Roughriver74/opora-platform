[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Фильтрация deprecation warnings от jose, passlib и sqlalchemy
filterwarnings =
    ignore::DeprecationWarning:jose
    ignore::DeprecationWarning:passlib
    ignore::sqlalchemy.exc.SAWarning
