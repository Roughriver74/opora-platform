# OPORA Production Docker Compose
# Deploy via Dokploy — git push triggers build
# Domain: myopora.ru

services:
  db:
    image: postgres:14-alpine
    restart: always
    volumes:
      - opora_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opora_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-opora_prod}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-opora_user} -d ${POSTGRES_DB:-opora_prod}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-opora_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-opora_prod}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-opora_prod}
      POSTGRES_USER: ${POSTGRES_USER:-opora_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      # App
      ENVIRONMENT: production
      DOCKER_ENV: "true"
      DEV_MODE: "False"
      CORS_ORIGINS: https://myopora.ru,https://www.myopora.ru,https://admin.myopora.ru
      APP_URL: https://myopora.ru
      # Bitrix24 (optional)
      BITRIX_API_ENDPOINT: ${BITRIX_API_ENDPOINT:-}
      BITRIX24_SMART_PROCESS_VISIT_ID: ${BITRIX24_SMART_PROCESS_VISIT_ID:-1054}
      # DaData (optional)
      TOKEN_DADATA: ${TOKEN_DADATA:-}
      SECRET_DADATA: ${SECRET_DADATA:-}
      # YuKassa (optional)
      YUKASSA_SHOP_ID: ${YUKASSA_SHOP_ID:-}
      YUKASSA_SECRET_KEY: ${YUKASSA_SECRET_KEY:-}
      YUKASSA_RETURN_URL: https://myopora.ru/admin/billing
      # SMTP (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@myopora.ru}
      # Files
      EXCEL_UPLOAD_PATH: /app/upload
      # Platform admin bootstrap (one-time use)
      PLATFORM_ADMIN_TOKEN: ${PLATFORM_ADMIN_TOKEN:-}
      # Admin subdomain
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-}
      # Redis
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "true"
    volumes:
      - opora_uploads:/app/upload
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
        REACT_APP_ENV: production
        REACT_APP_ADMIN_DOMAIN: ${REACT_APP_ADMIN_DOMAIN:-}
    restart: always
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  opora_db_data:
  opora_uploads:
  redis_data:
