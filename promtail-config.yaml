server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

# Настройки батчинга для уменьшения количества запросов к Loki
# Это поможет уменьшить ошибки "context canceled"
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h # 7 дней
  max_streams_per_user: 10000
  max_line_size: 256KB
  max_line_size_truncate: true

# Настройки батчинга логов перед отправкой
batch:
  max_size: 1048576 # 1MB
  max_wait: 3s
  timeout: 10s

clients:
  # Адрес центрального сервера мониторинга
  - url: http://45.146.164.152:3100/loki/api/v1/push
    # Настройки для устойчивости к ошибкам подключения
    timeout: 30s
    backoff_config:
      min_period: 1s
      max_period: 10m
      max_retries: 5

# Глобальные метки для всех логов
external_labels:
  host: beton-crm

scrape_configs:
  # Логи Docker контейнеров через Service Discovery
  # Это позволяет автоматически получать имена контейнеров и сервисов
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s # Увеличиваем интервал для уменьшения нагрузки

    relabel_configs:
      # Извлекаем имя контейнера (убираем слэш в начале)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name' # Исправлено: было 'container', должно быть 'container_name' для совместимости с Grafana

      # Извлекаем имя сервиса из docker-compose меток
      - source_labels:
          ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

      # Добавляем хост
      - target_label: 'host'
        replacement: 'beton-crm'

      # Исключаем контейнеры мониторинга из сбора логов (чтобы избежать рекурсии)
      - source_labels: ['__meta_docker_container_name']
        regex: '(promtail|loki|grafana|prometheus)'
        action: drop

      # Исключаем контейнеры без имени сервиса (системные контейнеры)
      - source_labels:
          ['__meta_docker_container_label_com_docker_compose_service']
        regex: ''
        action: drop

      # Формируем путь к лог-файлу на основе ID контейнера
      # Docker хранит логи в формате: /var/lib/docker/containers/{container_id}/{container_id}-json.log
      - source_labels: ['__meta_docker_container_id']
        regex: '(.+)'
        target_label: '__path__'
        replacement: /var/lib/docker/containers/${1}/${1}-json.log

      # Добавляем job label для фильтрации
      - target_label: 'job'
        replacement: 'docker-logs'

  # Системные логи (syslog)
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: beton-crm
          __path__: /var/log/syslog
