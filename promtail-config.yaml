server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  # Адрес центрального сервера мониторинга
  - url: http://45.146.164.152:3100/loki/api/v1/push

scrape_configs:
  # Логи Docker контейнеров через Service Discovery
  # Это позволяет автоматически получать имена контейнеров и сервисов
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        
    relabel_configs:
      # Извлекаем имя контейнера (убираем слэш в начале)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      
      # Извлекаем имя сервиса из docker-compose меток
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      
      # Добавляем хост
      - target_label: 'host'
        replacement: 'beton-crm'

      # Формируем путь к лог-файлу на основе ID контейнера
      - source_labels: ['__meta_docker_container_id']
        target_label: '__path__'
        replacement: /var/lib/docker/containers/$1/*.log

  # Системные логи (syslog)
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: beton-crm
          __path__: /var/log/syslog
