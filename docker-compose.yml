services:
  postgres:
    image: postgres:16-alpine
    container_name: beton_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: beton_crm
      POSTGRES_USER: beton_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-beton_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      # Доступ только через localhost (туннель)
      - '127.0.0.1:${DB_PORT:-5489}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./server/src/database/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U beton_user -d beton_crm']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beton_network

  redis:
    image: redis:7-alpine
    container_name: beton_redis
    restart: unless-stopped
    # Убираем внешний доступ - Redis доступен только внутри Docker сети
    # ports:
    #   - '${REDIS_PORT:-6396}:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beton_network

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: beton_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - '${ELASTICSEARCH_PORT:-9200}:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - beton_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.production
    container_name: beton_backend
    restart: unless-stopped
    ports:
      - '${PORT:-5001}:5001'
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5001}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: beton_user
      DB_PASSWORD: ${DB_PASSWORD:-beton_password}
      DB_NAME: beton_crm
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-30d}
      BITRIX_WEBHOOK: ${BITRIX_WEBHOOK}
      # Разрешаем домен и IP через запятую
      CORS_ORIGIN: ${CORS_ORIGIN:-https://beton.shknv.ru,http://beton.shknv.ru,https://beton.shknv.ru:3000,http://beton.shknv.ru:3000,http://31.128.39.123:3000,https://31.128.39.123:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    # volumes:
    #   - ./server:/app
    #   - /app/node_modules
    networks:
      - beton_network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.production
    container_name: beton_frontend
    restart: unless-stopped
    ports:
      - '${CLIENT_PORT:-3000}:3000'
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5001}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - backend
    # volumes:
    #   - ./client:/app
    #   - /app/node_modules
    networks:
      - beton_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  beton_network:
    driver: bridge
