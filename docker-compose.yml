services:
  postgres:
    image: postgres:16-alpine
    container_name: beton_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: beton_crm
      POSTGRES_USER: beton_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-beton_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5489}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./server/src/database/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beton_user -d beton_crm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beton_network

  redis:
    image: redis:7-alpine
    container_name: beton_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6396}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beton_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.production
    container_name: beton_backend
    restart: unless-stopped
    ports:
      - "${PORT:-5001}:5001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5001}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: beton_user
      DB_PASSWORD: ${DB_PASSWORD:-beton_password}
      DB_NAME: beton_crm
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-30d}
      BITRIX_WEBHOOK: ${BITRIX_WEBHOOK}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # volumes:
    #   - ./server:/app
    #   - /app/node_modules
    networks:
      - beton_network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.production
    container_name: beton_frontend
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5001}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - backend
    # volumes:
    #   - ./client:/app
    #   - /app/node_modules
    networks:
      - beton_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  beton_network:
    driver: bridge